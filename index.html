<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Title (Shows in browser tab and Google search results) -->
    <title>SRC Welfare Trust | NGO for Education, Healthcare & Social Welfare</title>
    
    <!-- Meta Description (Shows under title in Google search) -->
    <meta name="description" content="SRC Welfare Trust is a non-profit NGO dedicated to education, healthcare, food security, and social welfare programs for underprivileged communities in India." />
    
    <!-- Meta Keywords -->
    <meta name="keywords" content="NGO, charity, welfare, education, healthcare, food donation, volunteer, donate, social work, India, Telangana, Hyderabad" />
    
    <!-- Author -->
    <meta name="author" content="SRC Welfare Trust" />
    
    <!-- Robots (Tells Google to index your site) -->
    <meta name="robots" content="index, follow" />
    
    <!-- Geo Tags -->
    <meta name="geo.region" content="IN-TG" />
    <meta name="geo.placename" content="Hyderabad" />
    
    <!-- Open Graph / Facebook (How your site looks when shared on Facebook) -->
    <meta property="og:title" content="SRC Welfare Trust - Empowering Communities" />
    <meta property="og:description" content="Join us in making a difference. Support education, healthcare, and social welfare programs for those in need." />
    <meta property="og:image" content="https://src-welfare-front-end.vercel.app/favicon.png" />
    <meta property="og:url" content="https://src-welfare-front-end.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SRC Welfare Trust" />
    
    <!-- Twitter Card (How your site looks when shared on Twitter) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SRC Welfare Trust - Empowering Communities" />
    <meta name="twitter:description" content="Join us in making a difference. Support education, healthcare, and social welfare programs." />
    <meta name="twitter:image" content="https://src-welfare-front-end.vercel.app/favicon.png" />
    
    <!-- Canonical URL (Prevents duplicate content issues) -->
    <link rel="canonical" href="https://src-welfare-front-end.vercel.app/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
